<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            border: 3px solid #c9f;
            border-radius: 20px;
            color: red;
            background-color: yellow;
            margin: 0 auto;
        }
        .robot {
            width: 100px;
            height: 100px;
            border: 3px solid #de0dde;
            border-radius: 50%;
            padding: 50px;
        
        }
    </style>
</head>
<body>
    <div class="box">
        수요일
    </div>
    <div class="robot">
        목요일
    </div>
    
</body>
</html>
